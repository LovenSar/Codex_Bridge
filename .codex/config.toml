# Codex 项目级配置（与本目录 llm_config.json 配套使用）
# 联调验证：codex-cli 0.118.0（codex --version）
#
# 使用前先启动桥：python chat_bridge.py
# llm_config.json 的 api_base_url 应指向「真实上游 LLM」，不要填本桥端口（避免自环）。
#
# 在本目录下运行：codex -p bridge
#
# 说明：内置 model_provider=openai + openai_base_url 时，Codex 可能用 WebSocket 访问
# ws://.../v1/responses，而 chat_bridge 仅支持 HTTP POST，会 404。下面用自定义 provider
# 并设置 supports_websockets = false，强制走 HTTPS Responses。

[profiles]

[profiles.bridge]
model_provider = "code_bridge_http"
model = "Qwen/Qwen3.5-27B"

[profiles.upstream-openai]
model_provider = "openai"
model = "gpt-5.4"

[model_providers.code_bridge_http]
name = "Code Bridge (HTTP Responses only)"
base_url = "http://127.0.0.1:18081/v1"
wire_api = "responses"
supports_websockets = false
requires_openai_auth = true

